name: Integration

on:
  push:
    branches:
      - main
    paths:
      - 'action.yml'
      - '.github/workflows/dependabot.yml'
      - '.github/workflows/integration.yml'
      - 'tests/**'
  pull_request:
    paths:
      - 'action.yml'
      - '.github/workflows/dependabot.yml'
      - '.github/workflows/integration.yml'
      - 'tests/**'

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: Install Nix
        id: install_nix
        uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34

      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # All commits required to diff changes

      - name: Update Nix Flake
        id: update_nix_flake
        uses: ./
        with:
          token: ${{ github.token }}
          dir: tests/fixtures/basic-flake

      - name: Check Nix Flake
        id: check_flake
        working-directory: ./tests/fixtures/basic-flake
        run: |
          nix flake check
