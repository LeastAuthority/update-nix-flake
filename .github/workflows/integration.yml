name: Integration

on:
  push:
    branches:
      - main
    paths:
      - 'action.yml'
      - '.github/workflows/dependabot.yml'
      - '.github/workflows/integration.yml'
      - 'tests/**'
  pull_request:
    paths:
      - 'action.yml'
      - '.github/workflows/dependabot.yml'
      - '.github/workflows/integration.yml'
      - 'tests/**'

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: Install Nix
        id: install_nix
        uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35

      - name: Checkout
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # All commits required to diff changes

      - name: Update Nix Flake
        id: update_nix_flake
        uses: ./
        with:
          token: ${{ github.token }}
          dir: tests/fixtures/basic-flake

      - name: Check Nix Flake
        id: check_flake
        working-directory: ./tests/fixtures/basic-flake
        run: |
          nix flake check
